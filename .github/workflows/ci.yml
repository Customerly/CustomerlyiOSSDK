name: CI

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (SDK + Sample)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build SDK framework (min iOS target)
        run: |
          xcodebuild build \
            -project CustomerlySDK.xcodeproj \
            -scheme CustomerlySDK \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Release \
            | xcpretty || exit ${PIPESTATUS[0]}

      - name: Build Sample app
        run: |
          xcodebuild build \
            -project CustomerlySDK.xcodeproj \
            -scheme SampleApp \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            | xcpretty || exit ${PIPESTATUS[0]}

  test:
    name: Unit tests (Swift Package)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Pick a booted-capable iOS simulator
        id: sim
        run: |
          SIM_ID=$(xcrun simctl list devices available | grep -m1 -oE '\([0-9A-F-]{36}\)' | tr -d '()')
          echo "id=$SIM_ID" >> "$GITHUB_OUTPUT"
          echo "Using simulator $SIM_ID"

      - name: Run tests
        # The Swift Package and the .xcodeproj share this directory; xcodebuild resolves the
        # project by default (which has no test target), so we move it aside for the test run.
        run: |
          mv CustomerlySDK.xcodeproj /tmp/CustomerlySDK.xcodeproj.aside
          set +e
          xcodebuild test \
            -scheme Customerly \
            -destination "platform=iOS Simulator,id=${{ steps.sim.outputs.id }}" \
            -resultBundlePath TestResults.xcresult
          STATUS=$?
          set -e
          mv /tmp/CustomerlySDK.xcodeproj.aside CustomerlySDK.xcodeproj
          exit $STATUS

  lint:
    name: SwiftLint
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: Lint
        run: swiftlint lint --reporter github-actions-logging
