# SwiftLint configuration for the Customerly iOS SDK.
# Run locally with: swiftlint  (install via `brew install swiftlint`)
# Auto-fix formatting with: swiftlint --fix

included:
  - CustomerlySDK

excluded:
  - Tests
  - SampleApp
  - .build

disabled_rules:
  # The injected launcher HTML/JS is one intentionally long line.
  - line_length
  # Public model properties use snake_case to mirror the Customerly JSON/JS API
  # (app_id, user_id, account_id, ...). Renaming them would break the wire contract.
  - identifier_name
  - type_name
  - todo
  # Size/complexity rules that fight this SDK's shape by design: Customerly is a single
  # bridge class with a large `userContentController` message-dispatch switch, an inline
  # HTML/JS template in `loadMessengerHTML`, and ~36 near-identical public setOn*/removeOn*
  # methods. Splitting these to satisfy the rules would hurt clarity, not help it.
  - cyclomatic_complexity
  - function_body_length
  - type_body_length
  - file_length

opt_in_rules:
  - empty_count
  - closure_spacing
  - contains_over_first_not_nil
  - first_where
  - redundant_nil_coalescing

analyzer_rules: []
